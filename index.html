<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart India - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --user-msg: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --bot-msg: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .header-title {
            display: flex;
            flex-direction: column;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-title span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
        }
        
        .message.bot p {
            margin-top: 0;
        }
        .message.bot p:last-child {
            margin-bottom: 0;
        }
        
        .message.bot strong {
            color: #fff;
        }
        
        .message.bot ul {
            padding-left: 20px;
        }

        .input-area {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 14px 20px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
        }

        .send-btn {
            background: var(--user-msg);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: white;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bot-msg);
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .error-note {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="header-icon">🛒</div>
            <div class="header-title">
                <h1>ShopSmart India</h1>
                <span>Intelligent AI Assistant</span>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot">
                👋 Hello! I'm ShopSmart Bot. I can help recommend the best products for you across India. What are you looking for today?
            </div>
            <!-- Messages go here -->
            <div class="typing-indicator" id="typing">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            <button class="icon-btn" id="attach-btn" title="Attach Image">📸</button>
            <button class="icon-btn" id="mic-btn" title="Voice Input">🎤</button>
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let selectedImage = null;
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');
        const imageUpload = document.getElementById('image-upload');
        const attachBtn = document.getElementById('attach-btn');
        const micBtn = document.getElementById('mic-btn');

        // --- Image Attachment ---
        attachBtn.addEventListener('click', () => imageUpload.click());
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    selectedImage = evt.target.result;
                    userInput.placeholder = `Image attached: ${file.name}`;
                    userInput.focus();
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Voice Dictation ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            micBtn.addEventListener('click', () => {
                micBtn.style.background = 'rgba(239, 68, 68, 0.2)';
                micBtn.style.color = '#ef4444';
                userInput.placeholder = "Listening...";
                recognition.start();
            });
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userInput.value += (userInput.value ? ' ' : '') + text;
                resetMic();
            };
            recognition.onerror = () => resetMic();
            recognition.onend = () => resetMic();

            function resetMic() {
                micBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                micBtn.style.color = 'var(--text-main)';
                userInput.placeholder = selectedImage ? "Image attached..." : "Type your message...";
            }
        } else {
            micBtn.style.display = 'none';
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(role, text, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            if(role === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else if(isHtml) {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.textContent = text;
            }
            
            chatBox.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if(!text && !selectedImage) return;

            // Clear input and show user message
            userInput.value = '';
            
            const payload = { message: text, history: chatHistory };
            if (selectedImage) {
                payload.image = selectedImage;
                const previewHtml = `<img src="${selectedImage}" style="max-width:100px; border-radius:8px; display:block; margin-bottom:8px;">${text}`;
                appendMessage('user', previewHtml, true);
                selectedImage = null;
                userInput.placeholder = "Type your message...";
            } else {
                appendMessage('user', text);
            }
            
            // UI State
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const res = await fetch('/api/direct_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const data = await res.json();
                    chatHistory = data.history;
                    appendMessage('bot', data.response);
                } else {
                    const err = await res.json();
                    appendMessage('bot', `⚠️ Sorry, an error occurred.<br><span class="error-note">${err.error || 'Unknown error'}</span>`);
                }
            } catch (e) {
                appendMessage('bot', `⚠️ Network error. Make sure the server is running.<br><span class="error-note">${e.message}</span>`);
            } finally {
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
        
        userInput.focus();
    </script>
</body>
</html>
